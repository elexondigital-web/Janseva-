# Outer nginx for JanSeva production.
# Terminates HTTPS, gzips static responses, and proxies:
#   /api/*  →  backend:3000
#   /*       →  frontend:80 (the inner SPA-server nginx)
#
# Replace `yourdomain.com` placeholder before deploying. SSL certs
# are mounted from ./ssl (see docker-compose.prod.yml).

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;

  # Gzip — compresses HTML, JS, CSS, JSON, and SVG. Skip already-
  # compressed types (PNG/JPG/PDF) where it's pure CPU waste.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # Aadhaar images & member photos can be a few MB each.
  client_max_body_size 10M;

  # Hide the server version string.
  server_tokens off;

  # Logging — Common Log Format with response time for perf analysis.
  log_format combined_with_time
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log combined_with_time;
  error_log  /var/log/nginx/error.log warn;

  # ---- HTTP: redirect to HTTPS ----
  server {
    listen 80;
    server_name _;

    # Health check + ACME challenge stay on plain HTTP so cert-bot
    # renewals work; everything else upgrades.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ---- HTTPS: actual app ----
  server {
    listen 443 ssl http2;
    server_name _;

    # Replace these paths with the certs mounted via docker-compose.
    ssl_certificate     /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/privkey.pem;

    # Modern TLS only — TLS 1.0/1.1 are obsolete and unsafe.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (1 year) — only safe once HTTPS is fully verified working.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- API ----
    location /api/ {
      proxy_pass         http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";

      # Long timeout for big bulk-card PDF jobs.
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    # ---- Static SPA ----
    location / {
      proxy_pass         http://frontend:80;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
