# Internal nginx config for the frontend container.
# The OUTER nginx (in docker-compose.prod.yml) handles HTTPS, gzip,
# and /api/* proxying — this one just serves the SPA bundle and
# falls back to index.html for client-side routes.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache for fingerprinted assets (Vite emits hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every unknown path returns index.html so React
  # Router can take over.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Don't expose 404 redirects through fallback for these.
  location = /favicon.svg { try_files $uri =404; }
  location = /robots.txt  { try_files $uri =404; }
}
